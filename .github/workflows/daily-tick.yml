name: tick quotidiano

on:
  schedule:
    # 06:00 UTC ogni giorno. Cambia l'orario se preferisci un altro momento:
    # https://crontab.guru per calcolare l'espressione.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # permette di lanciarlo a mano da GitHub, per test

permissions:
  contents: write

jobs:
  run-tick:
    runs-on: ubuntu-latest
    steps:
      - name: checkout del repository
        uses: actions/checkout@v4

      - name: imposta Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: installa le dipendenze
        run: pip install -r requirements.txt

      - name: esegui il tick di oggi
        env:
          PANTALEO_WORKER_URL: ${{ secrets.PANTALEO_WORKER_URL }}
          PANTALEO_WORKER_SECRET: ${{ secrets.PANTALEO_WORKER_SECRET }}
        run: python run_tick.py --seed "${{ secrets.PANTALEO_SEED }}"

      - name: commit e push del nuovo stato
        run: |
          git config user.name "pantaleo-gemelli-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "tick: giorno $(python -c "import json;print(len(json.load(open('data/manifest.json')))-1)")"
          git push

  publish-pages:
    needs: run-tick
    runs-on: ubuntu-latest
    steps:
      - name: checkout (con lo stato appena aggiornato)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: pubblica su GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: deploy
        id: deployment
        uses: actions/deploy-pages@v4
